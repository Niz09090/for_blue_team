version: '3.8'

services:
  loghunter:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: loghunter-app
    ports:
      - "3075:3075"
    environment:
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-}
    volumes:
      - loghunter-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3075/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  loghunter-data:
